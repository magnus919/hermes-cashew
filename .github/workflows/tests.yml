# DO NOT RENAME THIS FILE. Phase 5's release.yml and PyPI trusted-publisher config lock in workflow
# filenames. Renaming tests.yml -> ci.yml will break trusted publishing when release.yml is added
# (see 01-RESEARCH.md Pitfall 6).
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, x64, hermes-cashew, docker]
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install uv && uv pip install --system -e ".[dev]"
        timeout-minutes: 5

      - name: AGENTS.md validation — verify install and test commands work
        run: |
          echo "::group::Validating AGENTS.md commands"
          # Verify 'pip install -e .[dev]' works (just ran above, check import)
          python -c "import plugins.memory.cashew; print('import OK')"
          # Verify 'pytest' collect works
          pytest --collect-only -q
          echo "::endgroup::"

      - name: Lint with ruff
        run: ruff check plugins/memory/cashew/ tests/ --output-format=github

      - name: Type check with mypy
        run: mypy --explicit-package-bases plugins/memory/cashew/

      - name: Dead code detection with vulture
        run: vulture plugins/memory/cashew/ --min-confidence 80

      - name: Duplicate code detection
        run: python scripts/check-duplicates.py

      - name: Dead feature flag detection
        run: python scripts/check-dead-flags.py

      - name: Unused dependency detection with deptry
        run: deptry .

      - name: Run tests with coverage (capture log for offline-download scan)
        run: |
          set -o pipefail
          pytest -xvs --cov=plugins/memory/cashew --cov-report=term --cov-report=xml --cov-fail-under=65 2>&1 | tee pytest.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: CI-03 — fail if embedding model was downloaded
        run: |
          if grep -E 'Downloading.*MiniLM' pytest.log; then
            echo "::error::Embedding model download detected — offline fixture bypassed"
            exit 1
          fi

      - name: Build performance summary
        run: |
          START=$(date -d "${{ github.run_started_at }}" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%S" "${{ github.run_started_at }}" +%s)
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          echo "Workflow run started at: ${{ github.run_started_at }}"
          echo "Total elapsed time: ${ELAPSED}s (test job only)"
          echo "Install: uv pip install (uv.lock cached)"
          echo "Optimizations: uv resolver (10x faster than pip), pytest-xvs (fail-fast)"

  wheel-smoke:
    runs-on: [self-hosted, linux, x64, hermes-cashew, docker]
    needs: test
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: pip install build && python -m build

      - name: CI-02 — install wheel into clean venv and verify discovery
        run: |
          set -o pipefail
          python -m venv /tmp/smoke
          {
            /tmp/smoke/bin/pip install dist/*.whl
            /tmp/smoke/bin/python -c "import plugins.memory.cashew; print(plugins.memory.cashew.__file__)"
            /tmp/smoke/bin/python -c "
          import importlib.metadata as im
          eps = list(im.entry_points(group='hermes_agent.plugins'))
          names = {ep.name for ep in eps}
          assert 'cashew' in names, f'missing cashew entry point; got {names}'
          print('OK — entry point discoverable')
          "
          } 2>&1 | tee wheel-smoke.log

      - name: CI-03 (wheel-smoke) — fail if embedding model was downloaded during wheel install/import
        run: |
          if grep -E 'Downloading.*MiniLM' wheel-smoke.log; then
            echo "::error::Embedding model download detected during wheel smoke — offline env bypassed"
            exit 1
          fi
