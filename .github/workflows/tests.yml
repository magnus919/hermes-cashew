# DO NOT RENAME THIS FILE. Phase 5's release.yml and PyPI trusted-publisher config lock in workflow
# filenames. Renaming tests.yml -> ci.yml will break trusted publishing when release.yml is added
# (see 01-RESEARCH.md Pitfall 6).
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests (capture log for offline-download scan)
        run: |
          set -o pipefail
          pytest -xvs 2>&1 | tee pytest.log

      - name: CI-03 — fail if embedding model was downloaded
        run: |
          if grep -E 'Downloading.*MiniLM' pytest.log; then
            echo "::error::Embedding model download detected — offline fixture bypassed"
            exit 1
          fi

  wheel-smoke:
    runs-on: ubuntu-latest
    needs: test
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: pip install build && python -m build

      - name: CI-02 — install wheel into clean venv and verify discovery
        run: |
          set -o pipefail
          python -m venv /tmp/smoke
          {
            /tmp/smoke/bin/pip install dist/*.whl
            /tmp/smoke/bin/python -c "import plugins.memory.cashew; print(plugins.memory.cashew.__file__)"
            /tmp/smoke/bin/python -c "
          import importlib.metadata as im
          eps = list(im.entry_points(group='hermes_agent.plugins'))
          names = {ep.name for ep in eps}
          assert 'cashew' in names, f'missing cashew entry point; got {names}'
          print('OK — entry point discoverable')
          "
          } 2>&1 | tee wheel-smoke.log

      - name: CI-03 (wheel-smoke) — fail if embedding model was downloaded during wheel install/import
        run: |
          if grep -E 'Downloading.*MiniLM' wheel-smoke.log; then
            echo "::error::Embedding model download detected during wheel smoke — offline env bypassed"
            exit 1
          fi
