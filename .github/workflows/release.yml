# Trusted publishing workflow for hermes-cashew.
# File name is locked by PyPI trusted-publisher configuration.
# DO NOT RENAME TO release.yml or ci.yml (would break OIDC environment binding).
name: Release

on:
  push:
    tags:
      - "v*"   # all version tags: v0.1.0, v0.1.0-rc1, v0.1.0-rc2, etc.

permissions:
  id-token: write   # required for OIDC trusted publishing

jobs:
  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------------------
  # Production PyPI publish — only for non-rc release tags (v1.0.0, v1.0.1)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref_name, '-') == false
    environment:
      name: pypi
      url: https://pypi.org/project/hermes-cashew/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
