# Trusted publishing workflow for hermes-cashew.
# File name is locked by PyPI trusted-publisher configuration.
# DO NOT RENAME THIS FILE (would break OIDC environment binding).
name: Release

on:
  push:
    tags:
      - "v*"   # all version tags: v0.1.0, v0.1.0-rc1, v0.1.0-rc2, etc.
  workflow_dispatch:       # allow manual re-runs (e.g. retry a failed PyPI publish)

permissions:
  id-token: write   # required for OIDC trusted publishing

jobs:
  # ---------------------------------------------------------------------------
  # Tests — gate: never publish with red tests
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: |
          set -o pipefail
          pytest -xvs 2>&1 | tee pytest.log
      - name: Fail if embedding model was downloaded
        run: |
          if grep -E 'Downloading.*MiniLM' pytest.log; then
            echo "::error::Embedding model download detected — offline fixture bypassed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="${TAG_VERSION%%-*}"
          PACKAGE_VERSION="$(grep -Po '^version = \"\K[^\"]+' pyproject.toml)"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION but pyproject.toml says $PACKAGE_VERSION"
            exit 1
          fi
          echo "Version match: v$PACKAGE_VERSION"
      - name: Sync plugin.yaml versions to pyproject.toml
        run: |
          VERSION="$(grep -Po '^version = \"\K[^\"]+' pyproject.toml)"
          for f in plugin.yaml plugins/memory/cashew/plugin.yaml; do
            sed -i "s/^version: .*/version: ${VERSION}/" "$f"
            echo "→ $f: version ${VERSION}"
          done
      - name: Install build dependencies
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------------------
  # Production PyPI publish — only for non-rc release tags (v1.0.0, v1.0.1)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref_name, '-') == false
    environment:
      name: pypi
      url: https://pypi.org/project/hermes-cashew/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # GitHub Release — auto-generate release notes from merged PR titles
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag \
            --title "$GITHUB_REF_NAME"
